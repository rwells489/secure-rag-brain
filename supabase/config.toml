# Supabase Configuration
# Run: supabase init (creates this file)

[api]
port = 54321

[db]
port = 54322
major_version = 16

[studio]
port = 54323

[inbucket]
port = 54324

[jwt]
expiry = 3600
secret = "your-super-secret-jwt-token-with-at-least-32-characters-long"

[functions]
document-triage = "supabase/functions/document-triage"

[edge_runtime]
policy = "import_map"
import_map = "import_map.json"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:8501"]
enable_signup = true

[auth.external]
github_enabled = false
google_enabled = false