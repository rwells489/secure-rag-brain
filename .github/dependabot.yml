# Dependabot Configuration
# Automated dependency updates for security and maintenance

version: 2
updates:
  # Python dependencies (root, aws-infra, src)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps):"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff*"
          - "mypy*"
          - "pre-commit*"
        update-types:
          - "minor"
          - "patch"
      aws-dependencies:
        patterns:
          - "boto3*"
          - "aws-*"
          - "moto*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci):"

  # Docker (if using)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"

  # NPM (for Supabase CLI, Deno, etc.)
  - package-ecosystem: "npm"
    directory: "/supabase"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "supabase"
    open-pull-requests-limit: 5