name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Version/Commit
      description: What version or commit hash are you using?
      placeholder: "main / abc1234"

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
      placeholder: "When I do X, Y happens but I expected Z"

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The document should be classified as approved"

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: "The document is incorrectly quarantined"

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - AWS Lambda (PII triage)
        - Supabase Migrations/RLS
        - Supabase Edge Function
        - Streamlit Frontend
        - SAM Template
        - Documentation
        - CI/CD Pipeline
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Messages
      description: Paste any relevant logs, stack traces, or error messages
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where did this occur?
      placeholder: |
        - OS: Ubuntu 22.04 / macOS 14 / Windows 11
        - Python: 3.11.x
        - Local / AWS / Supabase Cloud
        - Streamlit version

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have provided all requested information
          required: true