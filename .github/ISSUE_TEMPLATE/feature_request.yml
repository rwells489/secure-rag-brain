name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What's the use case?
      placeholder: "Currently, the PII scanner only detects US-format SSNs. International users need support for other national ID formats."

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like to see this implemented?
      placeholder: "Add configurable PII pattern registry with country-specific patterns (UK NINO, Canadian SIN, etc.)"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
      placeholder: "Could use a library like presidio-analyzer instead of regex patterns"

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - AWS Lambda (PII triage)
        - Supabase Migrations/RLS
        - Supabase Edge Function
        - Streamlit Frontend
        - SAM Template
        - CI/CD Pipeline
        - Documentation
        - Architecture/Design
        - Other

  - type: checkboxes
    id: scope
    attributes:
      label: Scope Impact
      options:
        - label: Breaking change (requires migration)
        - label: New configuration option
        - label: Internal refactor only
        - label: Documentation update needed

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, references, or links
      placeholder: "Related to #123"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: This feature aligns with project goals (secure, serverless, cost-effective)
          required: true